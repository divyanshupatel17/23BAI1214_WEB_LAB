<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Lab</title>
    <link rel="stylesheet" href="stylesMain.css">
    <!-- PDF.js for PDF viewing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-dark.min.css">
</head>
<body>
    <div class="theme-switch">
        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider round"></span>
        </label>
        <span class="theme-label">Dark Mode</span>
    </div>

    <div class="container">
        <header>
            <h1>Web Programming Lab</h1>
            <div class="student-info">
                <div class="info-grid">
                    <div class="info-item">
                        <strong>Name:</strong>
                        <span id="studentName"></span>
                    </div>
                    <div class="info-item">
                        <strong>Reg No:</strong>
                        <span id="regNo"></span>
                    </div>
                    <div class="info-item">
                        <strong>Course:</strong>
                        <span id="courseName"></span>
                    </div>
                    <div class="info-item">
                        <strong>Lab Slot:</strong>
                        <span id="labSlot"></span>
                    </div>
                    <div class="info-item">
                        <strong>Faculty:</strong>
                        <span id="facultyName"></span>
                    </div>
                    <div class="info-item">
                        <strong>Institute:</strong>
                        <span id="institute"></span>
                    </div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Exercises</h3>
                    <p id="totalExercises">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Tasks</h3>
                    <p id="totalTasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Last Updated</h3>
                    <p id="lastUpdated">-</p>
                </div>
            </div>
        </header>

        <div id="exerciseContainer"></div>
    </div>

    <!-- Modal for viewing content -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <div class="modal-actions">
                    <button id="downloadBtn" class="btn btn-download">Download</button>
                </div>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- PDF Viewer Modal -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h2>PDF Viewer</h2>
                <div class="modal-actions">
                    <button id="pdfDownloadBtn" class="btn btn-download">Download PDF</button>
                </div>
            </div>
            <canvas id="pdfViewer"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-markup.min.js"></script>
    <script src="config.js"></script>
    <script src="scriptMain.js"></script>
</body>
</html>
